<VirtualHost *:80>
    DocumentRoot /usr/local/apache2/htdocs/

    DirectoryIndex index.php

    <Directory /usr/local/apache2/htdocs/>
        AllowOverride All
        Require all granted
    </Directory>
    
    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php-fpm:9000/usr/local/apache2/htdocs/$1
</VirtualHost>